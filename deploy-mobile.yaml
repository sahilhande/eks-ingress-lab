apiVersion: apps/v1 
kind: Deployment 
metadata: 
  name: http-mobile 
  labels: 
    app: http-mobile 
spec: 
  replicas: 1 
  selector: 
    matchLabels: 
      app: http-mobile 
  template: 
    metadata: 
      name: http-mobile 
      labels: 
        app: http-mobile 
    spec: 
      containers: 
      - name: http-container 
        image: nginx:latest 
        ports: 
        - name: http-port 
          containerPort: 80
...
---
apiVersion: v1 
kind: Service 
metadata: 
  name: my-svc-mobile 
spec: 
  type: ClusterIP
  selector: 
    app: http-mobile 
  ports: 
  - name: my-svc-port 
    protocol: TCP 
    port: 80
    targetPort: 80